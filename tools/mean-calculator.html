<!DOCTYPE html>

<html>

<head>

<title>Mean Calculator</title>

<link rel="stylesheet" href="../styles.css">

</head>

<body>

<div class="content">

<h1>Mean Calculator</h1>

<input id="data" placeholder="10,20,30">

<button onclick="calc()">Calculate</button>

<h2 id="result"></h2>

</div>

<script>

function calc(){

let arr=document.getElementById("data").value.split(",").map(Number)

let sum=arr.reduce((a,b)=>a+b)

let mean=sum/arr.length

document.getElementById("result").innerText="Mean="+mean

}

</script>

</body>

</html>
